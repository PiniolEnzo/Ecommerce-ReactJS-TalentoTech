services:
  api:
    build:
      context: .
      target: dev
    command: npm run api
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    environment:
      API_PORT: 3001

  web:
    build:
      context: .
      target: dev
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  api_node_modules:
  web_node_modules:
